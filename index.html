<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прыжковая ситуация 2?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #1a1a2e;
            cursor: pointer;
            touch-action: none;
            border: none;
            outline: none;
        }
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        .score-panel {
            position: absolute;
            top: 28px;
            right: 32px;
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            padding: 8px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-family: 'Segoe UI', system-ui, sans-serif;
            pointer-events: none;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .score-panel span {
            display: inline-block;
            min-width: 3.6rem;
            text-align: center;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .mode-indicator {
            position: absolute;
            top: 28px;
            left: 32px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-family: 'Segoe UI', system-ui, sans-serif;
            pointer-events: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .flappy-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.92);
            backdrop-filter: blur(20px);
            z-index: 40;
            padding: 20px;
            transition: opacity 0.5s ease;
            pointer-events: auto;
        }
        .menu-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .menu-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #f7971e, #ffd200, #f7971e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            margin-bottom: 8px;
            animation: shimmer 3s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(247, 151, 30, 0.3);
            text-align: center;
            line-height: 1.2;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .menu-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.6rem);
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            letter-spacing: 4px;
            font-weight: 300;
        }
        .play-btn {
            padding: 18px 64px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            color: #1a1a2e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(247, 151, 30, 0.3);
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 60px rgba(247, 151, 30, 0.5);
        }
        .play-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 20px rgba(247, 151, 30, 0.3);
        }
        .menu-controls {
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .menu-controls span {
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 14px;
            border-radius: 8px;
            margin: 0 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        @media (max-width: 600px) {
            .play-btn { padding: 14px 40px; font-size: 1.2rem; }
            .mode-indicator { font-size: 0.8rem; top: 16px; left: 16px; padding: 6px 14px; }
            .score-panel { font-size: 1.4rem; top: 16px; right: 16px; padding: 6px 18px; }
            .menu-title { font-size: clamp(1.8rem, 6vw, 3rem); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="ui-overlay">
        <div class="mode-indicator" id="modeIndicator">■ КУБ</div>
        <div class="score-panel">🏆 <span id="scoreDisplay">0</span></div>
    </div>

    <!-- МЕНЮ -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-title">ПРЫЖКОВАЯ<br>СИТУАЦИЯ 2?</div>
        <div class="menu-subtitle">прыгай через кактусы</div>
        <button class="play-btn" id="playBtn">▶ ПОЕХАЛИ</button>
        <div class="menu-controls">
            <span>␣</span> или <span>🖱</span> прыжок
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const modeIndicator = document.getElementById('modeIndicator');
            const menuOverlay = document.getElementById('menuOverlay');
            const playBtn = document.getElementById('playBtn');

            // --- РАЗМЕРЫ ---
            let W, H, GROUND_Y, PLAYER_SIZE, BASE_SPEED;

            // --- СОСТОЯНИЕ ---
            const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
            const MODE = { DASH: 0, FLAPPY: 1 };
            let gameState = STATE.MENU;
            let currentMode = MODE.DASH;
            let flappyActive = false;

            // --- ИГРОК (ЧЁРНО-БЕЛЫЙ 2D КУБ) ---
            const player = {
                x: 60,
                y: 0,
                w: 28,
                h: 28,
                vy: 0,
                gravity: 0.42,
                jumpPower: -11.2,
                grounded: false,
                rotation: 0,
                rotSpeed: 0.085,
                isJumping: false
            };

            // --- FLAPPY ---
            const flappy = {
                gravity: 0.25,
                jumpPower: -6.8,
                pipeWidth: 0,
                pipeGap: 0,
                pipes: [],
                score: 0,
                passedPipe: false,
                safeGround: true
            };

            // --- ЧАСТИЦЫ ---
            let particles = [];
            let starField = [];

            function generateStars() {
                starField = [];
                for (let i = 0; i < 150; i++) {
                    starField.push({
                        x: Math.random() * 2000,
                        y: Math.random() * 2000,
                        size: Math.random() * 2 + 0.5,
                        brightness: Math.random() * 0.5 + 0.3,
                        twinkleSpeed: Math.random() * 0.02 + 0.005
                    });
                }
            }
            generateStars();

            function spawnJumpParticles(x, y) {
                for (let i = 0; i < 15; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed2 = Math.random() * 4 + 1.5;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed2,
                        vy: Math.sin(angle) * speed2 - 2.5,
                        life: 1,
                        decay: Math.random() * 0.025 + 0.015,
                        size: Math.random() * 4 + 2,
                        color: `rgba(255, 255, 255, ${0.3 + Math.random() * 0.3})`
                    });
                }
            }

            let obstacles = [];
            let score = 0;
            let frameCounter = 0;
            let speed = 5.5;
            const MIN_GAP = 70;
            const MAX_GAP = 130;
            let nextObstacleCounter = 60;
            let modeSwitchCooldown = 0;
            let flappyDuration = 0;
            const FLAPPY_DURATION = 500;
            let flappyTimer = 0;
            let gameSpeedMultiplier = 1;
            let isGameActive = false;
            let flappyStartScore = 0;
            let justExitedFlappy = false;
            let exitFlappyCooldown = 0;
            let groundOffset = 0;

            // --- ПОДГОН ПОД РАЗМЕР ---
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                W = canvas.width;
                H = canvas.height;
                GROUND_Y = H - Math.min(H * 0.16, 90);
                PLAYER_SIZE = Math.min(W * 0.055, 48, H * 0.09);
                if (PLAYER_SIZE < 22) PLAYER_SIZE = 22;
                BASE_SPEED = Math.max(4.5, W * 0.009);
                player.x = Math.min(W * 0.12, 100);
                player.y = GROUND_Y - PLAYER_SIZE;
                player.w = PLAYER_SIZE;
                player.h = PLAYER_SIZE;
                flappy.pipeWidth = PLAYER_SIZE * 0.5;
                flappy.pipeGap = PLAYER_SIZE * 4.5;
                for (let ob of obstacles) {
                    const ratio = ob.w / (ob.h || 28);
                    ob.h = Math.min(PLAYER_SIZE * 1.2, 42) + Math.floor(Math.random() * 10);
                    ob.w = Math.max(10, ob.h * ratio);
                    if (ob.w > 30) ob.w = 30;
                    ob.y = GROUND_Y - ob.h;
                }
                speed = BASE_SPEED * gameSpeedMultiplier;
            }

            // --- СБРОС ---
            function resetGame() {
                player.y = GROUND_Y - PLAYER_SIZE;
                player.vy = 0;
                player.grounded = false;
                player.rotation = 0;
                player.isJumping = false;
                player.w = PLAYER_SIZE;
                player.h = PLAYER_SIZE;
                player.x = Math.min(W * 0.12, 100);
                obstacles = [];
                flappy.pipes = [];
                flappy.score = 0;
                flappy.passedPipe = false;
                score = 0;
                frameCounter = 0;
                gameSpeedMultiplier = 1;
                speed = BASE_SPEED;
                nextObstacleCounter = Math.floor(Math.random() * 40) + 30;
                flappyActive = false;
                flappyTimer = 0;
                flappyDuration = 0;
                flappyStartScore = 0;
                justExitedFlappy = false;
                exitFlappyCooldown = 0;
                modeSwitchCooldown = 0;
                currentMode = MODE.DASH;
                isGameActive = true;
                gameState = STATE.PLAYING;
                particles = [];
                updateScoreDisplay();
                updateModeIndicator();
                menuOverlay.classList.add('hidden');
            }

            function gameOver() {
                gameState = STATE.GAMEOVER;
                isGameActive = false;
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed2 = Math.random() * 8 + 3;
                    particles.push({
                        x: player.x + PLAYER_SIZE / 2,
                        y: player.y + PLAYER_SIZE / 2,
                        vx: Math.cos(angle) * speed2,
                        vy: Math.sin(angle) * speed2 - 4,
                        life: 1,
                        decay: Math.random() * 0.015 + 0.005,
                        size: Math.random() * 6 + 2,
                        color: `rgba(255, 255, 255, ${0.5 + Math.random() * 0.3})`
                    });
                }
                setTimeout(() => {
                    if (gameState === STATE.GAMEOVER) {
                        menuOverlay.classList.remove('hidden');
                        gameState = STATE.MENU;
                        isGameActive = false;
                    }
                }, 500);
            }

            function updateScoreDisplay() {
                if (currentMode === MODE.FLAPPY) {
                    scoreSpan.textContent = Math.floor(flappyStartScore + flappy.score);
                } else {
                    scoreSpan.textContent = Math.floor(score);
                }
            }

            function updateModeIndicator() {
                if (currentMode === MODE.FLAPPY) {
                    modeIndicator.innerHTML = '🐦 FLAPPY <span class="flappy-badge">режим</span>';
                } else {
                    modeIndicator.innerHTML = '■ КУБ';
                }
            }

            // --- ПРЫЖОК ---
            function jump() {
                if (!isGameActive || gameState !== STATE.PLAYING) return;
                if (currentMode === MODE.FLAPPY) {
                    player.vy = flappy.jumpPower;
                    player.grounded = false;
                    player.isJumping = true;
                    player.rotation = -0.3;
                    spawnJumpParticles(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE);
                } else {
                    if (player.grounded) {
                        player.vy = player.jumpPower;
                        player.grounded = false;
                        player.isJumping = true;
                        player.rotation = 0;
                        spawnJumpParticles(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE);
                    }
                }
            }

            // --- ПЕРЕКЛЮЧЕНИЕ ---
            function switchToFlappy() {
                if (currentMode === MODE.FLAPPY || flappyActive) return;
                if (modeSwitchCooldown > 0) return;
                if (!isGameActive) return;
                
                currentMode = MODE.FLAPPY;
                flappyActive = true;
                flappy.pipes = [];
                flappy.score = 0;
                flappy.passedPipe = false;
                flappy.safeGround = true;
                flappyTimer = 0;
                flappyDuration = FLAPPY_DURATION;
                flappyStartScore = Math.floor(score);
                
                gameSpeedMultiplier = 0.4;
                speed = BASE_SPEED * gameSpeedMultiplier;
                player.y = GROUND_Y - PLAYER_SIZE * 4.5;
                player.vy = -2;
                player.grounded = false;
                justExitedFlappy = false;
                updateModeIndicator();
                updateScoreDisplay();
                modeSwitchCooldown = 30;
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed2 = Math.random() * 6 + 2;
                    particles.push({
                        x: W / 2,
                        y: H / 2,
                        vx: Math.cos(angle) * speed2,
                        vy: Math.sin(angle) * speed2,
                        life: 1,
                        decay: Math.random() * 0.02 + 0.01,
                        size: Math.random() * 5 + 2,
                        color: `rgba(255, 255, 255, ${0.3 + Math.random() * 0.3})`
                    });
                }
            }

            function exitFlappyMode() {
                if (currentMode !== MODE.FLAPPY) return;
                currentMode = MODE.DASH;
                flappyActive = false;
                flappy.pipes = [];
                score = flappyStartScore + 1000;
                
                gameSpeedMultiplier = 1;
                speed = BASE_SPEED;
                
                player.y = GROUND_Y - PLAYER_SIZE;
                player.vy = 0;
                player.grounded = true;
                justExitedFlappy = true;
                exitFlappyCooldown = 70;
                updateModeIndicator();
                updateScoreDisplay();
                modeSwitchCooldown = 60;
                obstacles = [];
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed2 = Math.random() * 6 + 2;
                    particles.push({
                        x: W / 2,
                        y: H / 2,
                        vx: Math.cos(angle) * speed2,
                        vy: Math.sin(angle) * speed2,
                        life: 1,
                        decay: Math.random() * 0.02 + 0.01,
                        size: Math.random() * 5 + 2,
                        color: `rgba(255, 255, 255, ${0.3 + Math.random() * 0.3})`
                    });
                }
            }

            // --- СПАВН ---
            function spawnFlappyPipe() {
                const minPipeHeight = PLAYER_SIZE * 1.5;
                const maxPipeHeight = GROUND_Y - PLAYER_SIZE * 3 - flappy.pipeGap;
                const height = minPipeHeight + Math.random() * (maxPipeHeight - minPipeHeight);
                flappy.pipes.push({
                    x: W,
                    topHeight: height,
                    bottomY: height + flappy.pipeGap,
                    scored: false
                });
            }

            function spawnObstacle() {
                if (justExitedFlappy && exitFlappyCooldown > 0) return;
                
                for (let ob of obstacles) {
                    if (ob.x < player.x + PLAYER_SIZE * 6 && ob.x > player.x - PLAYER_SIZE * 2) return;
                }

                const type = Math.floor(Math.random() * 4);
                let w, h;

                switch(type) {
                    case 0:
                        h = Math.min(PLAYER_SIZE * 1.0, 34) + Math.floor(Math.random() * 10);
                        w = Math.max(10, Math.min(PLAYER_SIZE * 0.5, 18) + Math.floor(Math.random() * 6));
                        break;
                    case 1:
                        h = Math.min(PLAYER_SIZE * 1.4, 50) + Math.floor(Math.random() * 8);
                        w = Math.max(10, Math.min(PLAYER_SIZE * 0.45, 16) + Math.floor(Math.random() * 5));
                        break;
                    case 2:
                        h = Math.min(PLAYER_SIZE * 0.8, 28) + Math.floor(Math.random() * 8);
                        w = Math.max(18, Math.min(PLAYER_SIZE * 0.8, 30) + Math.floor(Math.random() * 8));
                        break;
                    case 3:
                        h = Math.min(PLAYER_SIZE * 1.1, 38) + Math.floor(Math.random() * 10);
                        w = Math.max(16, Math.min(PLAYER_SIZE * 0.65, 24) + Math.floor(Math.random() * 6));
                        const gap = 6 + Math.floor(Math.random() * 10);
                        obstacles.push({
                            x: W + gap + w,
                            y: GROUND_Y - h,
                            w: w,
                            h: h,
                            type: 3,
                            isPair: true
                        });
                        break;
                }

                obstacles.push({
                    x: W,
                    y: GROUND_Y - h,
                    w: w,
                    h: h,
                    type: type,
                    isPair: false
                });
            }

            // --- ОБНОВЛЕНИЕ ---
            function update() {
                if (gameState !== STATE.PLAYING || !isGameActive) return;

                if (modeSwitchCooldown > 0) modeSwitchCooldown--;
                if (exitFlappyCooldown > 0) {
                    exitFlappyCooldown--;
                    if (exitFlappyCooldown === 0) justExitedFlappy = false;
                }

                // --- ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ---
                if (currentMode === MODE.DASH) {
                    const totalScore = Math.floor(score);
                    if (!flappyActive && totalScore > 0 && totalScore % 2000 === 1000 && modeSwitchCooldown === 0) {
                        switchToFlappy();
                    }
                }

                if (currentMode === MODE.FLAPPY) {
                    if (flappy.score >= 1000) {
                        exitFlappyMode();
                    }
                }

                speed = BASE_SPEED * gameSpeedMultiplier;

                // Обновление частиц
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.08;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }

                groundOffset = (groundOffset + speed * 0.6) % 80;

                if (currentMode === MODE.FLAPPY) {
                    // --- FLAPPY ФИЗИКА ---
                    player.vy += flappy.gravity;
                    player.y += player.vy;

                    if (player.vy < -1) {
                        player.rotation -= 0.035;
                    } else if (player.vy > 1) {
                        player.rotation += 0.025;
                    }
                    if (player.rotation > 0.4) player.rotation = 0.4;
                    if (player.rotation < -0.6) player.rotation = -0.6;

                    if (player.y > GROUND_Y - PLAYER_SIZE) {
                        player.y = GROUND_Y - PLAYER_SIZE;
                        player.vy = 0;
                        player.grounded = true;
                    }
                    if (player.y < 0) {
                        player.y = 0;
                        player.vy = 0;
                    }

                    for (let i = flappy.pipes.length - 1; i >= 0; i--) {
                        const pipe = flappy.pipes[i];
                        pipe.x -= speed;

                        if (pipe.x + flappy.pipeWidth < 0) {
                            flappy.pipes.splice(i, 1);
                            continue;
                        }

                        const px = player.x, py = player.y, sz = PLAYER_SIZE;
                        const pw = flappy.pipeWidth;
                        const tolerance = 3;
                        if (px + sz - tolerance > pipe.x && px + tolerance < pipe.x + pw) {
                            if (py + tolerance < pipe.topHeight || py + sz - tolerance > pipe.bottomY) {
                                gameOver();
                                return;
                            }
                        }

                        if (!pipe.scored && pipe.x + pw < player.x) {
                            pipe.scored = true;
                            flappy.score += 10;
                            updateScoreDisplay();
                        }
                    }

                    if (--nextObstacleCounter <= 0) {
                        spawnFlappyPipe();
                        nextObstacleCounter = Math.floor(Math.random() * 50) + 60;
                    }

                    flappyTimer++;
                    if (flappyTimer >= flappyDuration * 1.5) {
                        exitFlappyMode();
                    }

                } else {
                    // --- DASH РЕЖИМ ---
                    player.vy += player.gravity;
                    player.y += player.vy;

                    if (player.y >= GROUND_Y - PLAYER_SIZE) {
                        player.y = GROUND_Y - PLAYER_SIZE;
                        player.vy = 0;
                        if (!player.grounded) {
                            player.grounded = true;
                            player.isJumping = false;
                        }
                    } else {
                        player.grounded = false;
                    }

                    if (player.isJumping || !player.grounded) {
                        player.rotation += player.rotSpeed;
                        if (player.rotation > Math.PI * 2) {
                            player.rotation -= Math.PI * 2;
                        }
                    } else {
                        const target = Math.round(player.rotation / Math.PI) * Math.PI;
                        const diff = target - player.rotation;
                        if (Math.abs(diff) > 0.01) {
                            player.rotation += diff * 0.15;
                        } else {
                            player.rotation = target;
                        }
                    }

                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        const ob = obstacles[i];
                        ob.x -= speed;

                        if (ob.x + ob.w < 0) {
                            obstacles.splice(i, 1);
                            score += 15;
                            updateScoreDisplay();
                            continue;
                        }

                        if (gameState === STATE.PLAYING) {
                            const px = player.x, py = player.y, pw = player.w, ph = player.h;
                            if (px < ob.x + ob.w && px + pw > ob.x &&
                                py < ob.y + ob.h && py + ph > ob.y) {
                                gameOver();
                            }
                        }
                    }

                    if (--nextObstacleCounter <= 0) {
                        let canSpawn = true;
                        for (let ob of obstacles) {
                            if (ob.x > W - 160) { canSpawn = false; break; }
                        }
                        if (canSpawn) {
                            spawnObstacle();
                            nextObstacleCounter = Math.floor(Math.random() * (MAX_GAP - MIN_GAP + 1)) + MIN_GAP;
                            if (speed < 11) speed += 0.06;
                        } else {
                            nextObstacleCounter = Math.floor(Math.random() * 14) + 6;
                        }
                    }

                    if (frameCounter % 2 === 0) {
                        score += 1;
                        updateScoreDisplay();
                    }
                    frameCounter++;
                }
            }

            // --- ОТРИСОВКА ---
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // --- ФОН ---
                const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
                if (currentMode === MODE.FLAPPY) {
                    grad.addColorStop(0, '#0b1a2e');
                    grad.addColorStop(0.5, '#1a3a5a');
                    grad.addColorStop(1, '#2a5a7a');
                } else {
                    grad.addColorStop(0, '#0f0e1a');
                    grad.addColorStop(0.4, '#1a1a2e');
                    grad.addColorStop(0.8, '#2a1a2e');
                    grad.addColorStop(1, '#1a0a1a');
                }
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, GROUND_Y);

                // --- Звёзды ---
                for (let star of starField) {
                    const brightness = star.brightness + Math.sin(frameCounter * star.twinkleSpeed) * 0.2;
                    ctx.globalAlpha = Math.max(0.2, Math.min(1, brightness));
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(star.x % W, star.y % H, star.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // --- Земля ---
                const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
                groundGrad.addColorStop(0, '#2a1a1a');
                groundGrad.addColorStop(0.3, '#1a0a0a');
                groundGrad.addColorStop(1, '#0a0505');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

                // --- Линия земли ---
                ctx.shadowColor = 'rgba(255, 255, 255, 0.1)';
                ctx.shadowBlur = 15;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, GROUND_Y);
                ctx.lineTo(W, GROUND_Y);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // --- Текстура земли ---
                ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
                for (let i = -groundOffset; i < W + 80; i += 80) {
                    ctx.fillRect(i, GROUND_Y + 6, 40, 2);
                    ctx.fillRect(i + 20, GROUND_Y + 14, 30, 2);
                }

                // --- Рисуем объекты ---
                if (currentMode === MODE.FLAPPY) {
                    drawFlappyPipes();
                    // Прогресс-бар
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    ctx.fillRect(0, 0, W, 4);
                    const progress = flappy.score / 1000;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.1)';
                    ctx.shadowBlur = 10;
                    ctx.fillRect(0, 0, W * Math.min(progress, 1), 4);
                    ctx.shadowBlur = 0;
                } else {
                    for (let ob of obstacles) {
                        drawCactus(ob);
                    }
                }

                // --- Частицы ---
                for (let p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.1)';
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // --- ЧЁРНО-БЕЛЫЙ 2D КУБ ---
                drawPlayer();

                // --- GAME OVER ---
                if (gameState === STATE.GAMEOVER) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.2)';
                    ctx.shadowBlur = 30;
                    ctx.font = `bold ${Math.min(W * 0.07, 64)}px 'Segoe UI', system-ui, sans-serif`;
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('GAME OVER', W/2, H/2 - 20);
                    ctx.shadowBlur = 0;
                    ctx.font = `${Math.min(W * 0.025, 24)}px 'Segoe UI', system-ui, sans-serif`;
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillText('возврат в меню...', W/2, H/2 + 50);
                }
            }

            // --- ОТРИСОВКА ИГРОКА (ЧЁРНО-БЕЛЫЙ 2D КУБ) ---
            function drawPlayer() {
                const px = player.x, py = player.y, sz = PLAYER_SIZE;
                const cx = px + sz / 2;
                const cy = py + sz / 2;

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(player.rotation);

                // Основной куб — белый с чёрной обводкой
                ctx.shadowColor = 'rgba(255, 255, 255, 0.15)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 4;

                // Заливка белым
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-sz/2, -sz/2, sz, sz);

                // Чёрная обводка
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2.5;
                ctx.strokeRect(-sz/2, -sz/2, sz, sz);

                // Лёгкая тень внутри (для объёма) — верхняя грань чуть темнее
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(-sz/2, -sz/2, sz, 3);

                // Нижняя грань чуть темнее
                ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
                ctx.fillRect(-sz/2, sz/2 - 3, sz, 3);

                ctx.restore();
            }

            // --- ОТРИСОВКА КАКТУСА (чёрно-белая стилизация) ---
            function drawCactus(ob) {
                const x = ob.x, y = ob.y, w = ob.w, h = ob.h;
                const type = ob.type || 0;

                // Основной кактус — белый с чёрной обводкой
                ctx.shadowColor = 'rgba(255, 255, 255, 0.05)';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x, y, w, h);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);

                // Шипы (чёрные)
                ctx.fillStyle = '#000000';
                ctx.fillRect(x - 3, y + 6, 4, 3);
                ctx.fillRect(x - 2, y + 14, 3, 3);
                ctx.fillRect(x - 3, y + h - 8, 4, 3);
                ctx.fillRect(x + w - 1, y + 8, 4, 3);
                ctx.fillRect(x + w, y + 18, 3, 3);
                ctx.fillRect(x + w - 1, y + h - 10, 4, 3);

                if (type === 1) {
                    ctx.fillRect(x - 2, y + 22, 3, 3);
                    ctx.fillRect(x + w - 1, y + 26, 3, 3);
                    ctx.fillRect(x + 4, y + 4, 2, 8);
                } else if (type === 2) {
                    ctx.fillRect(x - 4, y + 10, 5, 3);
                    ctx.fillRect(x - 4, y + 18, 5, 3);
                    ctx.fillRect(x + w - 1, y + 12, 5, 3);
                    ctx.fillRect(x + w - 1, y + 20, 5, 3);
                } else if (type === 3) {
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(x - 4, y + h/2 - 2, 4, 4);
                }
            }

            // --- ОТРИСОВКА ТРУБ (чёрно-белая стилизация) ---
            function drawFlappyPipes() {
                for (let pipe of flappy.pipes) {
                    const x = pipe.x;
                    const pw = flappy.pipeWidth;
                    
                    // Верхняя труба
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.05)';
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x, 0, pw, pipe.topHeight);
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, 0, pw, pipe.topHeight);
                    
                    // Крышка верхней трубы
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x - 4, pipe.topHeight - 18, pw + 8, 18);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x - 4, pipe.topHeight - 18, pw + 8, 18);

                    // Нижняя труба
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x, pipe.bottomY, pw, GROUND_Y - pipe.bottomY);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, pipe.bottomY, pw, GROUND_Y - pipe.bottomY);
                    
                    // Крышка нижней трубы
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x - 4, pipe.bottomY, pw + 8, 18);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x - 4, pipe.bottomY, pw + 8, 18);
                }
            }

            // --- ЦИКЛ ---
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // --- ОБРАБОТЧИКИ ---
            function handleKey(e) {
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    jump();
                }
            }

            function handleCanvasClick(e) {
                e.preventDefault();
                jump();
            }

            // --- МЕНЮ ---
            function setupMenu() {
                playBtn.addEventListener('click', function() {
                    if (gameState === STATE.MENU || gameState === STATE.GAMEOVER) {
                        resetGame();
                    }
                });

                menuOverlay.addEventListener('click', function(e) {
                    if (gameState === STATE.MENU || gameState === STATE.GAMEOVER) {
                        if (e.target === this || e.target === playBtn) {
                        }
                    }
                });
            }

            // --- ИНИЦИАЛИЗАЦИЯ ---
            function init() {
                resizeCanvas();
                gameState = STATE.MENU;
                isGameActive = false;
                player.y = GROUND_Y - PLAYER_SIZE;
                player.x = Math.min(W * 0.12, 100);
                player.w = PLAYER_SIZE;
                player.h = PLAYER_SIZE;
                player.grounded = false;
                player.rotation = 0;
                player.isJumping = false;
                obstacles = [];
                flappy.pipes = [];
                score = 0;
                speed = BASE_SPEED;
                updateScoreDisplay();
                updateModeIndicator();
                draw();

                window.addEventListener('keydown', handleKey);
                canvas.addEventListener('click', handleCanvasClick);
                canvas.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    handleCanvasClick(e);
                }, { passive: false });

                window.addEventListener('resize', () => {
                    resizeCanvas();
                    player.y = GROUND_Y - PLAYER_SIZE;
                    player.x = Math.min(W * 0.12, 100);
                    player.w = PLAYER_SIZE;
                    player.h = PLAYER_SIZE;
                    for (let ob of obstacles) {
                        const ratio = ob.w / (ob.h || 28);
                        ob.h = Math.min(PLAYER_SIZE * 1.2, 42) + Math.floor(Math.random() * 10);
                        ob.w = Math.max(10, ob.h * ratio);
                        if (ob.w > 30) ob.w = 30;
                        ob.y = GROUND_Y - ob.h;
                    }
                    speed = BASE_SPEED * gameSpeedMultiplier;
                });

                setupMenu();
                gameLoop();
            }

            if (document.readyState === 'complete') {
                init();
            } else {
                window.addEventListener('load', init);
            }
        })();
    </script>
</body>
